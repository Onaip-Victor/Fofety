<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- CORREÇÃO 1: O initial-scale foi alterado de 5.0 para 1.0 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fofety - Pipoca e Algodão Doce</title>
    
    <!-- CORREÇÃO 2: Caminho do ícone corrigido para funcionar na internet -->
    <link rel="icon" type="image/png" href="./apple-touch-icon.png">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    
    <!-- React e ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
        }
        h1, h2, h3, h4, .font-display {
            font-family: 'Fredoka', sans-serif;
        }
        .bg-pattern {
            background-color: #ffffff00;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23f9a8d4' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        
        /* CORREÇÃO 3: Garantia extra de que imagens não vão estourar a tela no celular */
        img {
            max-width: 100%;
            height: auto;
        }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            pink: '#FF69B4',
                            lightPink: '#FFB6C1',
                            blue: '#87CEEB',
                            yellow: '#FFD700',
                            purple: '#9370DB'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Navbar = () => {
            const [isOpen, setIsOpen] = useState(false);

            return (
                <nav className="bg-white shadow-md sticky top-0 z-50">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between h-20">
                            <div className="flex items-center">
                                <span className="font-display text-3xl text-brand-pink font-bold flex items-center gap-2">
                                    <i className="fas fa-cloud text-brand-blue"></i> Fofety
                                </span>
                            </div>
                            
                            <div className="hidden md:flex items-center space-x-8">
                                <a href="#home" className="text-gray-600 hover:text-brand-pink transition font-semibold">Início</a>
                                <a href="#servicos" className="text-gray-600 hover:text-brand-pink transition font-semibold">Serviços</a>
                                <a href="#galeria" className="text-gray-600 hover:text-brand-pink transition font-semibold">Galeria</a>
                                <a href="#contato" className="bg-brand-pink text-white px-6 py-2 rounded-full hover:bg-pink-600 transition font-bold shadow-lg transform hover:-translate-y-1">
                                    Pedir Orçamento
                                </a>
                            </div>

                            <div className="md:hidden flex items-center">
                                <button onClick={() => setIsOpen(!isOpen)} className="text-gray-600 hover:text-brand-pink focus:outline-none">
                                    <i className={`fas ${isOpen ? 'fa-times' : 'fa-bars'} text-2xl`}></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    {isOpen && (
                        <div className="md:hidden bg-white border-t border-gray-100 animate-fade-in">
                            <div className="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                                <a href="#home" onClick={() => setIsOpen(false)} className="block px-3 py-2 text-gray-600 hover:text-brand-pink hover:bg-pink-50 rounded-md font-semibold">Início</a>
                                <a href="#servicos" onClick={() => setIsOpen(false)} className="block px-3 py-2 text-gray-600 hover:text-brand-pink hover:bg-pink-50 rounded-md font-semibold">Serviços</a>
                                <a href="#galeria" onClick={() => setIsOpen(false)} className="block px-3 py-2 text-gray-600 hover:text-brand-pink hover:bg-pink-50 rounded-md font-semibold">Galeria</a>
                                <a href="#contato" onClick={() => setIsOpen(false)} className="block px-3 py-2 text-brand-pink font-bold hover:bg-pink-50 rounded-md">Pedir Orçamento</a>
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        const Hero = () => {
            return (
                <section id="home" className="relative bg-gradient-to-br from-blue-100 via-pink-100 to-yellow-100 py-20 lg:py-32 overflow-hidden">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                            <div className="text-center md:text-left space-y-6">
                                <span className="inline-block bg-white px-4 py-2 rounded-full text-brand-pink font-bold shadow-sm text-sm uppercase tracking-wide">
                                    Transformando momentos em doçura
                                </span>
                                {/* CORREÇÃO 4: Adicionado tamanhos dinâmicos (text-4xl sm:text-5xl) para telas muito pequenas não quebrarem o texto */}
                                <h1 className="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-bold text-gray-800 leading-tight">
                                    A Melhor <span className="text-brand-yellow drop-shadow-sm">Pipoca</span> & <br/>
                                    <span className="text-brand-blue drop-shadow-sm">Algodão Doce</span>
                                </h1>
                                <p className="text-lg md:text-xl text-gray-600 max-w-lg mx-auto md:mx-0">
                                    Carrinhos gourmet charmosos para aniversários, casamentos, eventos corporativos e muito mais. Faça sua festa inesquecível!
                                </p>
                                <div className="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                                    <a href="#contato" className="bg-brand-pink text-white px-8 py-4 rounded-full text-lg font-bold shadow-lg hover:bg-pink-600 transition transform hover:-translate-y-1 flex items-center justify-center gap-2">
                                        <i className="fab fa-whatsapp"></i> Agendar Agora
                                    </a>
                                    <a href="#galeria" className="bg-white text-brand-pink border-2 border-brand-pink px-8 py-4 rounded-full text-lg font-bold hover:bg-pink-50 transition flex items-center justify-center">
                                        Ver Fotos
                                    </a>
                                </div>
                            </div>
                            <div className="relative animate-float hidden md:block">
                                <img 
                                    src="https://images.unsplash.com/photo-1516746924754-0eb796aa149c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                                    alt="Algodão Doce Colorido" 
                                    className="rounded-3xl shadow-2xl rotate-3 border-8 border-white"
                                />
                                <div className="absolute -bottom-10 -left-10 bg-white p-6 rounded-2xl shadow-xl max-w-xs transform -rotate-3">
                                    <div className="flex items-center gap-3 mb-2">
                                        <div className="text-brand-yellow">
                                            <i className="fas fa-star"></i>
                                            <i className="fas fa-star"></i>
                                            <i className="fas fa-star"></i>
                                            <i className="fas fa-star"></i>
                                            <i className="fas fa-star"></i>
                                        </div>
                                    </div>
                                    <p className="text-gray-600 italic">"O carrinho é lindo e a pipoca deliciosa! As crianças amaram."</p>
                                    <p className="text-sm font-bold text-gray-800 mt-2">- Maria Silva</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="absolute top-20 right-10 text-brand-blue opacity-20 text-6xl animate-pulse">
                        <i className="fas fa-cloud"></i>
                    </div>
                    <div className="absolute bottom-20 left-10 text-brand-yellow opacity-30 text-6xl">
                        <i className="fas fa-certificate"></i>
                    </div>
                </section>
            );
        };

        const Services = () => {
            const services = [
                {
                    icon: "fa-candy-cane",
                    title: "Algodão Doce Gourmet",
                    description: "Nuvens de açúcar coloridas e saborosas. Fazemos na hora, encantando adultos e crianças.",
                    color: "bg-blue-100 text-brand-blue"
                },
                {
                    icon: "fa-certificate", 
                    title: "Pipoca Crocante",
                    description: "Opções salgadas na manteiga e doces caramelizadas. O cheirinho é irresistível!",
                    color: "bg-yellow-100 text-yellow-600"
                },
                {
                    icon: "fa-users",
                    title: "Equipe Uniformizada",
                    description: "Atendentes simpáticos, uniformizados e treinados para servir com higiene e alegria.",
                    color: "bg-pink-100 text-brand-pink"
                }
            ];

            return (
                <section id="servicos" className="py-20 bg-white">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-16">
                            <h2 className="text-4xl font-bold text-gray-800 mb-4">Nossos Serviços</h2>
                            <p className="text-xl text-gray-600">Levamos toda a estrutura necessária para o seu evento</p>
                            <div className="w-24 h-1 bg-brand-pink mx-auto mt-6 rounded-full"></div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {services.map((service, index) => (
                                <div key={index} className="bg-gray-50 rounded-2xl p-8 hover:shadow-xl transition duration-300 border border-gray-100 text-center group">
                                    <div className={`w-20 h-20 mx-auto ${service.color} rounded-full flex items-center justify-center text-3xl mb-6 transform group-hover:scale-110 transition`}>
                                        <i className={`fas ${service.icon}`}></i>
                                    </div>
                                    <h3 className="text-2xl font-bold mb-4 text-gray-800">{service.title}</h3>
                                    <p className="text-gray-600 leading-relaxed">{service.description}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Gallery = () => {
            const events = [
                {
                    id: 1,
                    title: "Aniversário da Laura - 5 Anos",
                    type: "Festa Infantil",
                    img: "https://images.unsplash.com/photo-1502086223501-8351e33e8a0c?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
                },
                {
                    id: 2,
                    title: "Festa Junina na Escola",
                    type: "Evento Escolar",
                    img: "https://images.unsplash.com/photo-1574676169670-e6660fb22ae6?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" 
                },
                {
                    id: 3,
                    title: "Casamento Rafael & Ana",
                    type: "Estação Gourmet",
                    img: "https://images.unsplash.com/photo-1527661591475-527312dd65f5?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
                },
                {
                    id: 4,
                    title: "Batizado do Miguel",
                    type: "Evento Familiar",
                    img: "https://images.unsplash.com/photo-1623727902404-585860361324?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
                },
                {
                    id: 5,
                    title: "Evento Corporativo Nubank",
                    type: "Corporativo",
                    img: "https://images.unsplash.com/photo-1473187983305-f615310e7daa?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
                },
                {
                    id: 6,
                    title: "Chá de Bebê",
                    type: "Chá Revelação",
                    img: "https://images.unsplash.com/photo-1533230626779-7a71f0217586?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
                }
            ];

            return (
                <section id="galeria" className="py-20 bg-pattern">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-16">
                            <h2 className="text-4xl font-bold text-gray-800 mb-4">Galeria de Festas</h2>
                            <p className="text-xl text-gray-600">Um pouco do nosso trabalho em eventos recentes</p>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                            {events.map((event) => (
                                <div key={event.id} className="bg-white rounded-2xl overflow-hidden shadow-lg group">
                                    <div className="relative h-64 overflow-hidden">
                                        <img 
                                            src={event.img} 
                                            alt={event.title} 
                                            className="w-full h-full object-cover transform group-hover:scale-110 transition duration-700"
                                            onError={(e) => {e.target.src = 'https://placehold.co/600x400?text=Festa+Doce+Alegria'}}
                                        />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition duration-300 flex items-end p-6">
                                            <span className="text-white font-bold"><i className="fas fa-camera mr-2"></i> Ver detalhes</span>
                                        </div>
                                    </div>
                                    <div className="p-6">
                                        <span className="text-sm font-bold text-brand-pink uppercase tracking-wider">{event.type}</span>
                                        <h3 className="text-xl font-bold text-gray-800 mt-2">{event.title}</h3>
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        <div className="text-center mt-12">
                            <p className="text-gray-600 mb-6">Quer ver mais fotos? Siga nosso Instagram!</p>
                            <a href="https://www.instagram.com/fofetybemdoce?igsh=NndxOXA0eXVqMjV5" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 text-brand-purple font-bold text-lg hover:underline">
                                <i className="fab fa-instagram text-2xl"></i> @fofetybemdoce
                            </a>
                        </div>
                    </div>
                </section>
            );
        };

        const Contact = () => {
            return (
                <section id="contato" className="py-20 bg-white relative">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="bg-brand-pink rounded-3xl overflow-hidden shadow-2xl flex flex-col items-center">
                            
                            {/* Informações de Contato Centralizadas */}
                            <div className="bg-gray-900 text-white p-6 sm:p-10 md:p-14 w-full flex flex-col items-center text-center">
                                <div className="w-full">
                                    <h3 className="text-3xl sm:text-4xl font-bold mb-6">Vamos festejar?</h3>
                                    <p className="text-gray-300 mb-12 text-base sm:text-lg leading-relaxed max-w-2xl mx-auto">
                                        Entre em contato para verificar disponibilidade e receber um orçamento personalizado para tornar sua festa inesquecível.
                                    </p>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                                        <div className="flex flex-col items-center gap-4">
                                            <div className="bg-brand-pink p-4 rounded-full">
                                                <i className="fas fa-phone-alt text-2xl"></i>
                                            </div>
                                            <div>
                                                <p className="text-sm text-gray-400">Telefone / WhatsApp</p>
                                                <p className="text-xl font-bold">(24) 99876-1729</p>
                                            </div>
                                        </div>
                                        
                                        <div className="flex flex-col items-center gap-4 break-all sm:break-normal px-2">
                                            <div className="bg-brand-pink p-4 rounded-full">
                                                <i className="fas fa-envelope text-2xl"></i>
                                            </div>
                                            <div>
                                                <p className="text-sm text-gray-400">Email</p>
                                                <p className="text-xl font-bold">fofetybemdoce@gmail.com</p>
                                            </div>
                                        </div>

                                        <div className="flex flex-col items-center gap-4">
                                            <div className="bg-brand-pink p-4 rounded-full">
                                                <i className="fas fa-map-marker-alt text-2xl"></i>
                                            </div>
                                            <div>
                                                <p className="text-sm text-gray-400">Atendemos em</p>
                                                <p className="text-xl font-bold">Resende RJ e Região</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="flex flex-col sm:flex-row gap-6 mt-4 w-full justify-center">
                                    <a 
                                        href="https://api.whatsapp.com/message/Z5OXOFQWDPBIO1?autoload=1&app_absent=0&utm_source=ig&utm_medium=social&utm_content=link_in_bio&fbclid=PAdGRzdgOujBlleHRuA2FlbQIxMQBzcnRjBmFwcF9pZA81NjcwNjczNDMzNTI0MjcAAafq22QMvpFUO1ZrbEhM9ppUsjXMKLd56c1ojvNzp2J2F4KraJ65jH4IOqlTpA_aem_JQ00NNiE-LF2A4QVh67pXw" 
                                        target="_blank" 
                                        className="bg-green-500 hover:bg-green-600 text-white px-8 py-4 rounded-full font-bold text-lg sm:text-xl flex items-center justify-center gap-3 transition transform hover:scale-105 shadow-xl w-full sm:w-auto"
                                    >
                                        <i className="fab fa-whatsapp text-2xl"></i> Conversar agora
                                    </a>
                                    <div className="flex gap-4 items-center justify-center">
                                        <a 
                                            href="https://www.instagram.com/fofetybemdoce?igsh=NndxOXA0eXVqMjV5" 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="w-14 h-14 rounded-full bg-gray-700 flex items-center justify-center hover:bg-brand-pink transition"
                                        >
                                            <i className="fab fa-instagram text-2xl"></i>
                                        </a>
                                        <a 
                                            href="https://www.facebook.com/share/1Ehj9XMm3G/" 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="w-14 h-14 rounded-full bg-gray-700 flex items-center justify-center hover:bg-brand-pink transition"
                                        >
                                            <i className="fab fa-facebook-f text-2xl"></i>
                                        </a>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-gray-50 py-8 border-t border-gray-200">
                    <div className="max-w-7xl mx-auto px-4 text-center">
                        <div className="flex justify-center items-center gap-2 mb-4">
                            <i className="fas fa-cloud text-brand-pink text-2xl"></i>
                            <span className="font-display text-2xl font-bold text-gray-800">Fofety Bem Doce</span>
                        </div>
                        <p className="text-gray-500 text-sm">
                            &copy; 2025 Fofety Festas. Todos os direitos reservados.
                        </p>
                    </div>
                </footer>
            );
        };

        const WhatsAppButton = () => {
            return (
                <a 
                    href="https://api.whatsapp.com/message/Z5OXOFQWDPBIO1?autoload=1&app_absent=0&utm_source=ig&utm_medium=social&utm_content=link_in_bio&fbclid=PAdGRzdgOujBlleHRuA2FlbQIxMQBzcnRjBmFwcF9pZA81NjcwNjczNDMzNTI0MjcAAafq22QMvpFUO1ZrbEhM9ppUsjXMKLd56c1ojvNzp2J2F4KraJ65jH4IOqlTpA_aem_JQ00NNiE-LF2A4QVh67pXw" 
                    target="_blank"
                    className="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl hover:bg-green-600 transition transform hover:scale-110 z-50 flex items-center gap-2 group"
                >
                    <i className="fab fa-whatsapp text-3xl"></i>
                    <span className="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-500 ease-in-out whitespace-nowrap font-bold">
                         Fazer Orçamento
                    </span>
                </a>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen overflow-x-hidden">
                    <Navbar />
                    <Hero />
                    <Services />
                    <Gallery />
                    <Contact />
                    <Footer />
                    <WhatsAppButton />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
